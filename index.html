<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Onay, yaş sorusu ve canlı sohbet içeren kısa anket." />
  <title>Anket ve Canlı Sohbet</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="page-title">
      <div class="badge">Özel anket</div>
      <h1 id="page-title">Kısa Anket</h1>
      <p class="intro">
        Lütfen aşağıdaki soruları cevaplayın. Onay verirseniz, canlı sohbeti de başlatabilirsiniz.
      </p>

      <form id="surveyForm" method="POST" target="hiddenFrame" novalidate>
        <input type="text" class="website-field" name="website" tabindex="-1" autocomplete="off" aria-hidden="true" />

        <div class="field">
          <fieldset>
            <legend>Bilgilerinizi paylaşmaya onay veriyor musunuz?</legend>
            <div class="choice-grid">
              <label class="choice-card">
                <input type="radio" name="consent" value="Yes" required />
                <span>
                  <strong>Evet</strong>
                  <small>Anket cevabımı paylaşmaya onay veriyorum.</small>
                </span>
              </label>

              <label class="choice-card">
                <input type="radio" name="consent" value="No" required />
                <span>
                  <strong>Hayır</strong>
                  <small>Onay vermiyorum.</small>
                </span>
              </label>
            </div>
          </fieldset>
        </div>

        <div class="field hidden" id="ageField">
          <label for="age">Yaşınız nedir?</label>
          <input type="number" id="age" name="age" min="1" max="120" inputmode="numeric" placeholder="Yaşınızı girin" />
        </div>

        <input type="hidden" id="submittedAt" name="submittedAt" />
        <input type="hidden" id="pageUrl" name="pageUrl" />
        <input type="hidden" id="userAgent" name="userAgent" />
        <input type="hidden" id="timeZone" name="timeZone" />

        <div class="actions">
          <button class="primary-btn" type="submit">Cevapları gönder</button>
          <button class="dark-btn hidden" type="button" id="chatButton">Benimle sohbet et</button>
        </div>

        <p class="helper-text">
          Cevaplarınız doğrudan site sahibinin Google Sheet'ine gönderilir.
        </p>

        <div id="statusBox" class="status hidden" role="status" aria-live="polite"></div>
      </form>

      <iframe name="hiddenFrame" title="Hidden form submission frame" class="hidden-frame"></iframe>

    </section>
  </main>

  <script>
    window.SURVEY_CONFIG = {
      // 1) Replace this after deploying Google Apps Script as a Web App.
      googleAppsScriptUrl: "https://script.google.com/macros/s/AKfycbwp5qUxGXv_vlw2IL_1O-CmN7vJeRi9qkmHJLS77qxZc27FJgSsnvKLVhIbrtheYKyg/exec",

      // 2) Replace this with only the src URL from your Tawk.to widget code.
      // Example format: https://embed.tawk.to/PROPERTY_ID/WIDGET_ID
      tawkScriptUrl: "https://embed.tawk.to/6a04a60e1ba64a1c35e55117/1joh2ha8l"
    };
  </script>
  <script src="assets/app.js"></script>
</body>
</html>
